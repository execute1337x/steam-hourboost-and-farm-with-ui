<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giriş — Steam Farmer Panel</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #9aa8bc;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --radius: 12px;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(180deg, #0b1017 0%, var(--bg) 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
    }
    .login-card h1 { margin: 0 0 6px; font-size: 1.5rem; }
    .login-card p { margin: 0 0 20px; color: var(--muted); font-size: 0.92rem; }
    .login-form { display: grid; gap: 14px; }
    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.88rem;
      color: var(--muted);
    }
    input {
      background: #111827;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.95rem;
    }
    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }
    .btn {
      border: none;
      border-radius: 8px;
      padding: 11px 16px;
      font-size: 0.95rem;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
      font-weight: 600;
    }
    .btn:hover { background: var(--primary-hover); }
    .login-error {
      display: none;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.35);
      color: #fca5a5;
      font-size: 0.88rem;
      margin-bottom: 14px;
    }
    .login-error.visible { display: block; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Steam Farmer Panel</h1>
    <p>Panel girişi — Steam hesap şifresi değil</p>
    <div id="login-error" class="login-error"></div>
    <form id="login-form" class="login-form">
      <label>
        Kullanıcı adı
        <input type="text" name="username" autocomplete="username" required autofocus />
      </label>
      <label>
        Şifre
        <input type="password" name="password" autocomplete="current-password" required />
      </label>
      <button type="submit" class="btn">Giriş yap</button>
    </form>
  </div>
  <script>
    const form = document.getElementById("login-form");
    const errorEl = document.getElementById("login-error");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.classList.remove("visible");
      const fd = new FormData(form);
      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({
            username: fd.get("username"),
            password: fd.get("password"),
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Giriş başarısız");
        window.location.replace("/");
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add("visible");
      }
    });
  </script>
</body>
</html>
